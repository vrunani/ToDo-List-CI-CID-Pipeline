<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tasks</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#640202;padding:2rem 1rem}
    #app{max-width:560px;margin:0 auto;background:#fff;border-radius:12px;padding:2rem;box-shadow:0 2px 12px rgba(0,0,0,.08)}
    h1{font-size:22px;font-weight:600;margin-bottom:4px}
    .sub{font-size:13px;color:#888;margin-bottom:1.5rem}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
    .stat{background:#f5f5f5;border-radius:8px;padding:10px;text-align:center}
    .stat-n{font-size:20px;font-weight:600}
    .stat-l{font-size:11px;color:#888;margin-top:2px}
    .progress-bar{height:4px;background:#eee;border-radius:4px;margin-bottom:1.5rem;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#7F77DD,#5DCAA5);border-radius:4px;transition:width .4s}
    .input-row{display:flex;gap:8px;margin-bottom:1rem}
    .input-row input{flex:1;height:40px;border-radius:8px;border:1px solid #ddd;padding:0 12px;font-size:14px;outline:none}
    .input-row input:focus{border-color:#7F77DD}
    select,button{height:40px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;padding:0 12px}
    .filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
    .filter-btn{height:28px;padding:0 12px;border-radius:20px;border:1px solid #ddd;background:transparent;color:#888;font-size:12px;cursor:pointer}
    .filter-btn.active{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
    .list{display:flex;flex-direction:column;gap:8px}
    .todo-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1px solid #eee;border-radius:10px}
    .todo-item.done{opacity:.55}
    .todo-item input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#7F77DD}
    .priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .p-high{background:#E24B4A}.p-med{background:#EF9F27}.p-low{background:#1D9E75}
    .todo-text{flex:1;font-size:14px}
    .todo-item.done .todo-text{text-decoration:line-through;color:#aaa}
    .tag{font-size:11px;padding:2px 8px;border-radius:20px;background:#EEEDFE;color:#534AB7}
    .del-btn{border:none;background:none;color:#ccc;cursor:pointer;font-size:15px}
    .del-btn:hover{color:#E24B4A}
    .empty{text-align:center;padding:2rem;color:#aaa;font-size:14px}
  </style>
</head>
<body>
<div id="app">
  <h1>My tasks</h1>
  <p class="sub" id="date-label"></p>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">total</div></div>
    <div class="stat"><div class="stat-n" id="s-done" style="color:#1D9E75">0</div><div class="stat-l">done</div></div>
    <div class="stat"><div class="stat-n" id="s-left" style="color:#E24B4A">0</div><div class="stat-l">left</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="input-row">
    <input id="inp" placeholder="Add a new task..." maxlength="80"/>
    <select id="pri">
      <option value="low">Low</option>
      <option value="med" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <button id="addbtn">+ Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn" data-f="active">Active</button>
    <button class="filter-btn" data-f="done">Completed</button>
    <button class="filter-btn" data-f="high">High priority</button>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
const TAGS=['work','personal','study','health','home','idea'];
let filter='all';
let todos=[
  {id:1,text:'Review project proposal',done:false,pri:'high',tag:'work'},
  {id:2,text:'Morning run',done:true,pri:'med',tag:'health'},
  {id:3,text:'Read 20 pages',done:false,pri:'low',tag:'personal'},
];
let nextId=4;
const listEl=document.getElementById('list');
const inpEl=document.getElementById('inp');
const priEl=document.getElementById('pri');
document.getElementById('date-label').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
function render(){
  const visible=todos.filter(t=>filter==='active'?!t.done:filter==='done'?t.done:filter==='high'?t.pri==='high':true);
  const done=todos.filter(t=>t.done).length,total=todos.length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=total-done;
  document.getElementById('progress').style.width=(total?Math.round(done/total*100):0)+'%';
  if(!visible.length){listEl.innerHTML='<div class="empty">No tasks here</div>';return;}
  listEl.innerHTML='';
  visible.forEach(t=>{
    const d=document.createElement('div');
    d.className='todo-item'+(t.done?' done':'');d.dataset.id=t.id;
    d.innerHTML=`<input type="checkbox" ${t.done?'checked':''} onchange="toggle(${t.id})"><div class="priority-dot p-${t.pri}"></div><span class="todo-text">${t.text}</span>${t.tag?`<span class="tag">${t.tag}</span>`:''}<button class="del-btn" onclick="remove(${t.id})">✕</button>`;
    listEl.appendChild(d);
  });
}
window.toggle=id=>{const t=todos.find(x=>x.id===id);if(t){t.done=!t.done;render();}};
window.remove=id=>{todos=todos.filter(x=>x.id!==id);render();};
function addTodo(){
  const text=inpEl.value.trim();if(!text)return;
  todos.unshift({id:nextId++,text,done:false,pri:priEl.value,tag:TAGS[Math.floor(Math.random()*TAGS.length)]});
  inpEl.value='';filter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f==='all'));
  render();
}
document.getElementById('addbtn').addEventListener('click',addTodo);
inpEl.addEventListener('keydown',e=>{if(e.key==='Enter')addTodo()});
document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{
  filter=btn.dataset.f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');render();
}));
render();
</script>
</body>
</html>
