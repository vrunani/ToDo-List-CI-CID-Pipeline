
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#eef4f0;padding:2rem 1rem}
#app{max-width:560px;margin:0 auto;background:#f7fbf8;border-radius:16px;padding:2rem;border:1px solid #b8d9c4}
h1{font-size:22px;font-weight:600;color:#1a4a30;margin-bottom:4px}
.sub{font-size:13px;color:#5a8a72;margin-bottom:1.5rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:#e4f2ea;border-radius:10px;padding:10px;text-align:center;border:1px solid #c2dece}
.stat-n{font-size:20px;font-weight:600;color:#1a4a30}
.stat-l{font-size:11px;color:#5a8a72;margin-top:2px}
.stat-n.done-n{color:#1D9E75}
.stat-n.left-n{color:#185FA5}
.progress-bar{height:5px;background:#c2dece;border-radius:4px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:#3B8BD4;border-radius:4px;transition:width .4s}
.input-row{display:flex;gap:8px;margin-bottom:1rem}
.input-row input{flex:1;height:40px;border-radius:10px;border:1px solid #b8d9c4;padding:0 12px;font-size:14px;outline:none;background:#fff;color:#1a4a30}
.input-row input:focus{border-color:#378ADD;box-shadow:0 0 0 2px #daeaf7}
.input-row input::placeholder{color:#8aaf9a}
select{height:40px;border-radius:10px;border:1px solid #b8d9c4;background:#fff;font-size:13px;cursor:pointer;padding:0 12px;color:#1a4a30}
#addbtn{height:40px;border-radius:10px;border:none;background:#3B8BD4;color:#fff;font-size:13px;font-weight:500;cursor:pointer;padding:0 16px;transition:background .15s}
#addbtn:hover{background:#185FA5}
.filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{height:28px;padding:0 14px;border-radius:20px;border:1px solid #b8d9c4;background:transparent;color:#5a8a72;font-size:12px;cursor:pointer;transition:all .15s}
.filter-btn.active{background:#3B8BD4;border-color:#3B8BD4;color:#fff}
.filter-btn:hover:not(.active){background:#e4f2ea}
.list{display:flex;flex-direction:column;gap:8px}
.todo-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1px solid #c2dece;border-radius:12px;transition:opacity .2s}
.todo-item.done{opacity:.55}
.todo-item input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:#3B8BD4}
.priority-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.p-high{background:#D85A30}.p-med{background:#3B8BD4}.p-low{background:#1D9E75}
.todo-text{flex:1;font-size:14px;color:#1a4a30}
.todo-item.done .todo-text{text-decoration:line-through;color:#8aaf9a}
.tag{font-size:11px;padding:2px 9px;border-radius:20px;background:#e4f2ea;color:#0F6E56;border:1px solid #9FE1CB}
.del-btn{border:none;background:none;color:#b8d9c4;cursor:pointer;font-size:15px;transition:color .15s}
.del-btn:hover{color:#D85A30}
.empty{text-align:center;padding:2rem;color:#8aaf9a;font-size:14px}
</style>
<div id="app">
  <h1>My tasks</h1>
  <p class="sub" id="date-label"></p>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">total</div></div>
    <div class="stat"><div class="stat-n done-n" id="s-done">0</div><div class="stat-l">done</div></div>
    <div class="stat"><div class="stat-n left-n" id="s-left">0</div><div class="stat-l">left</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="input-row">
    <input id="inp" placeholder="Add a new task..." maxlength="80"/>
    <select id="pri">
      <option value="low">Low</option>
      <option value="med" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <button id="addbtn">+ Add</button>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn" data-f="active">Active</button>
    <button class="filter-btn" data-f="done">Completed</button>
    <button class="filter-btn" data-f="high">High priority</button>
  </div>
  <div class="list" id="list"></div>
</div>
<script>
const TAGS=['work','personal','study','health','home','idea'];
let filter='all';
let todos=[
  {id:1,text:'Review project proposal',done:false,pri:'high',tag:'work'},
  {id:2,text:'Morning run',done:true,pri:'med',tag:'health'},
  {id:3,text:'Read 20 pages',done:false,pri:'low',tag:'personal'},
];
let nextId=4;
const listEl=document.getElementById('list');
const inpEl=document.getElementById('inp');
const priEl=document.getElementById('pri');
document.getElementById('date-label').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
function render(){
  const visible=todos.filter(t=>filter==='active'?!t.done:filter==='done'?t.done:filter==='high'?t.pri==='high':true);
  const done=todos.filter(t=>t.done).length,total=todos.length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=total-done;
  document.getElementById('progress').style.width=(total?Math.round(done/total*100):0)+'%';
  if(!visible.length){listEl.innerHTML='<div class="empty">No tasks here</div>';return;}
  listEl.innerHTML='';
  visible.forEach(t=>{
    const d=document.createElement('div');
    d.className='todo-item'+(t.done?' done':'');
    d.innerHTML=`<input type="checkbox" ${t.done?'checked':''} onchange="toggle(${t.id})"><div class="priority-dot p-${t.pri}"></div><span class="todo-text">${t.text}</span>${t.tag?`<span class="tag">${t.tag}</span>`:''}<button class="del-btn" onclick="remove(${t.id})">&#x2715;</button>`;
    listEl.appendChild(d);
  });
}
window.toggle=id=>{const t=todos.find(x=>x.id===id);if(t){t.done=!t.done;render();}};
window.remove=id=>{todos=todos.filter(x=>x.id!==id);render();};
function addTodo(){
  const text=inpEl.value.trim();if(!text)return;
  todos.unshift({id:nextId++,text,done:false,pri:priEl.value,tag:TAGS[Math.floor(Math.random()*TAGS.length)]});
  inpEl.value='';filter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f==='all'));
  render();
}
document.getElementById('addbtn').addEventListener('click',addTodo);
inpEl.addEventListener('keydown',e=>{if(e.key==='Enter')addTodo()});
document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{
  filter=btn.dataset.f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');render();
}));
render();
</script>
